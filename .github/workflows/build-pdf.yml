name: Build and Deploy PDF

on:
  push:
    branches:
      - main

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install MyST CLI & Typst
        run: |
          npm install -g mystmd
          sudo wget https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Build PDF
        run: |
          # Force the build execution and print directory contents to confirm creation
          myst build --all --pdf
          echo "=== Verifying Build Directory ==="
          ls -R _build/ || echo "No _build folder found!"

      - name: Upload PDF Artifact Only
        uses: actions/upload-artifact@v4
        with:
          name: compiled-blog-pdf
          # This forces GitHub to look directly in the target directory for the .pdf file
          path: _build/pdf/*.pdf
          if-no-files-found: error