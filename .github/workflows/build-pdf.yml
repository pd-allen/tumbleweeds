name: Build and Deploy PDF
on:
  push:
    branches:
      - main

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MyST CLI & Typst
        run: |
          npm install -g mystmd
          sudo wget https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

      - name: Build PDF
        run: myst build --all --pdf

     - name: Commit and Push PDF back to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p pdfs
          cp -r _build/pdf/* pdfs/
          git add pdfs/
          git commit -m "Automated PDF generation [skip ci]" || exit 0
          git push