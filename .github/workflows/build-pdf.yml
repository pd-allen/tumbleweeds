name: Build and Deploy PDF

on:
  push:
    branches:
      - main

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Install MyST CLI
        run: npm install -g mystmd

      - name: Build PDF Document
        run: |
          # The --all flag forces MyST to read the project exports block
          myst build --all --pdf
          echo "=== Verifying PDF output ==="
          ls -l _build/pdf/ || echo "No PDF directory contents found."

      - name: Upload PDF Artifact Only
        uses: actions/upload-artifact@v4
        with:
          name: compiled-blog-pdf
          path: _build/pdf/blog-document.pdf
          if-no-files-found: error