version: 1
project:
  title: The Traveling Tumbleweeds
  description: Terry and Sandy tour the World.
  # thumbnail: images/profile-thumbnail.webp
  # authors:
  #   - name: Sandy Cyr and Terry Sullivan
  #     email: cyr_sullivan@hotmail.com
  
  copyright: '2026'
  keywords:
    - 2025
    - 2024
    - 2023
  github: https://pd-allen.github.io/tumbleweeds/
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: tags/2025.md
    - file: tags/2024.md
    - file: tags/2023.md
    - file: tags/Flora Fauna.md
    - file: contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: tumbleweed.png
    logo_dark: tumbleweed.png
    favicon: fav.ico
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  actions:
    - title: RSS
      url: https://opengeos.org/myst-blog-template/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
    footer: |
     
