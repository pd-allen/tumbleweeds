version: 1
project:
  title: My Blog
  description: A blog about data science, open-source software, and teaching, powered by MyST Markdown.
  # thumbnail: images/profile-thumbnail.webp
  # authors:
  #   - name: Jane Doe
  #     email: jane.doe@example.com
  #     orcid: 0000-0000-0000-0000
  #     url: https://example.com
  #     affiliations:
  #       - Example University
  copyright: '2026'
  keywords:
    - Blog
    - Data Science
    - Open-source Software
  github: opengeos/myst-blog-template
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: tags/myst-markdown.md
    - file: tags/tutorial.md
    - file: tags/github-pages.md
    - file: contact.md
    - pattern: posts/*.md
      hidden: true
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    style: custom.css
    # analytics_google: G-XXXXXXXXXX
    folders: true
  actions:
    - title: RSS
      url: https://opengeos.org/myst-blog-template/rss.xml
  template: book-theme
  parts:
    primary_sidebar_footer: ''
    footer: |
      [GitHub](https://github.com/username) |
      [LinkedIn](https://www.linkedin.com/in/username) |
      [Twitter](https://twitter.com/username)
