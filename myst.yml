        - posts/here-comes-spring-sydney-2025.md
        - posts/in-search-of-the-tasmanian-devil-febuary-2025.md
        - posts/back-in-potts-point-sydney-jan-feb 2025.md
        - posts/touring-south-america-winter-2024.md
        - posts/touring-the-iberian-peninsula-fall-2024.md
        - posts/from-amsterdam-to-barcelona.md
        - posts/summer-in-canada-2024.md
        - posts/run-to-the-barn-june-2024.md
        - posts/vancouver-in-may-31-may-2024.md
        - posts/back-in-canada-1-apr-2024.md
        - posts/from-newcastle-to-sydney-12-march-2024.md
        - posts/gold-coast-27-march-2024.md
        - posts/south-australia-3-march-2024.md
        - posts/melbourne-well-that-was-fun-29-january.md
