version: 1
project:
  title: The Traveling Tumbleweeds
  description: Terry and Sandy tour the World.
  copyright: '2026'
  keywords:
    - "2025"
    - "2024"
    - "2023"
    - "Flora Fauna"
  github: https://pd-allen.github.io/tumbleweeds/
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - fonts/**
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  toc:
    - file: index.md
    - file: tags/2025.md
    - file: tags/2024.md
    - file: tags/2023.md
    - file: tags/Flora Fauna.md
    - file: contact.md
    - pattern: posts/*.md
      hidden: true

  # FIX: Adjusted export path to look directly into the exports directory
  exports:
    - format: typst
      template: plain_typst_book
      output: _build/exports/blog-document.pdf
      articles:
        - index.md
        - tags/2025.md
        - tags/2024.md
        - tags/2023.md
        - tags/Flora Fauna.md
        - contact.md